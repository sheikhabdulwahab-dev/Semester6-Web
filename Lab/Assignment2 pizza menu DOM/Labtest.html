<!DOCTYPE html>
<html lang="en">
<head>
     <title>Document</title>

     <style> 
        #container
        {
            display: grid;
            grid-template-columns: repeat(12 , 1fr);
            grid-template-rows: repeat(24 , 1fr);
            height: 100vh;
             

        }
        .box
        {
             
            border: 2px solid black;
            background-color: lightblue ;
           
            margin: 2px;
             
        }
  .product-gallery {
   display: flex;
   flex-wrap: wrap;       /* This allows products to wrap to new lines */
   justify-content: space-evenly; /* Even spacing between cards */
   align-items: center;   /* Centered vertically */
   padding: 20px;
   height: 100%;          /* Full height of the grid box */
   width: 100%;           /* Full width of the grid box */
}

.product-card {
   display: flex;
   flex-direction: column; /* Stack the image, then the button vertically */
   justify-content: center; /* Center them within the card */
   align-items: center;    /* Center them horizontally within the card */
   width: 150px;           /* Or width: 200px, depending on how big you want cards */
   margin: 15px;           /* Breathing space between cards */
}

.card-img {
   width: 70%;            /* Fills the product-card width (150px) */
   height: 100px;          /* Forces a specific, square height for the image */
   object-fit: cover;     /* Important: Crops the image so it doesn't stretch awkwardly */
   margin-bottom: 10px;    /* Space between the image and the button */
   border-radius: 8px;     /* Optional: Rounded corners look professional for clothing */
}

.add-to-cart-btn {
   background-color: #ffc107; /* A nice "pizza" yellow/orange */
   color: black;
   border: none;
   padding: 5px 10px;      /* Small padding creates a small button */
   border-radius: 4px;     /* Small rounded corners */
   cursor: pointer;        /* Shows a pointer hand when hovering */
   font-size: 0.8rem;      /* Optional: Smaller font makes the button smaller */
}
    
     </style>
</head>
<body>

    <div id="container">

        <div class="box" style="grid-row : 1/25; grid-column : 1/10;"> 
 
            <div class="product-gallery"> 
                 

                <div class="product-card">
                    <h4> Oregano  </h4>
                     
                    <img src="https://images.ctfassets.net/j8tkpy1gjhi5/5OvVmigx6VIUsyoKz1EHUs/b8173b7dcfbd6da341ce11bcebfa86ea/Salami-pizza-hero.jpg" class="card-img">
                     <button class="add-to-cart-btn" onclick="bill('Oregano' , 1000 )">Add to Cart</button>
                     <h4> 1000</h4>
                </div>

                  <div class="product-card">
                    <h4>Cheese  </h4>
                    <img src="https://hips.hearstapps.com/hmg-prod/images/classic-cheese-pizza-recipe-2-64429a0cb408b.jpg?crop=0.6666666666666667xw:1xh;center,top&resize=1200:*" class="card-img">
                     <button class="add-to-cart-btn" onclick="bill('Cheese' , 1500 )">Add to Cart</button>
                     <h4> 1500</h4>
                </div>

                  <div class="product-card">
                    <h4> olivemagazine</h4>
                    <img src=" https://images.immediate.co.uk/production/volatile/sites/2/2025/04/Capricciosa-bianca-a1d18b2.jpg?resize=1366,1503" class="card-img">
                     <button class="add-to-cart-btn" onclick="bill('olivemagazine' , 1200 )">Add to Cart</button>
                     <h4> 1200</h4>
                </div>

                  <div class="product-card">
                    <h4> Chicken Parmesan  </h4>
                    <img src="https://i0.wp.com/olivesandlamb.com/wp-content/uploads/2024/05/Chicken-Parmesan-Pizza-10-4x5-1.jpg?resize=819%2C1024&ssl=1" class="card-img">
                     <button class="add-to-cart-btn" onclick="bill('Chicken Parmesan' , 1100 )">Add to Cart</button>
                     <h4> 1100</h4>
                </div>

                  <div class="product-card">
                    <h4> Classic Veggie </h4>
                    <img src="https://dudethatcookz.com/wp-content/uploads/2024/09/classic_veggie_pizza_4.jpg" class="card-img">
                     <button class="add-to-cart-btn" onclick="bill('Classic Veggie' , 1600 )">Add to Cart</button>
                     <h4> 1600</h4>
                </div>

                  <div class="product-card">
                    <h4> Vegetarian </h4>
                    <img src="https://cdn.loveandlemons.com/wp-content/uploads/2023/02/vegetarian-pizza.jpg" class="card-img">
                     <button class="add-to-cart-btn" onclick="bill('Vegetarian' , 900)"> Add to Cart </button> 
                     <h4> 900</h4>
                </div>


            </div>
            

         
        
        </div>

      
        <div class="box" style="grid-row: 1/10; grid-column: 10/13 ;">  

        <div style="display: flex;  justify-content: center; align-items: center;   height: 100%;"> 
        <form style="display: flex;  flex-direction: column;   align-items: center;    gap: 5px;  ">
            <label for="login" > Login</label>
            <input type = "text" id="login" name="Email" placeholder="Enter Email"   >  

             <label for="loginpas" > Password</label>
            <input type = "text" id="loginpas" name="Email_Password" placeholder="Enter Password" >
            <button  type="button"  onclick="check()"> Submit</button>

            <p id = "show"> </p>
          </form>
  
   
                      </div>

        </div>


        <div class="box" style="grid-row: 10/25; grid-column: 10/13;">  
            <h3 style="display: flex; justify-content: center;"> Bill Detail </h3>
             
            <h4 id = "name" > </h4>
            <!-- <h4 id = "price"> </h4> -->
            <h3 id = "total"> </h3>
            <h3 id = "dis"> </h3>

            

        </div>
         



        <script>


             let total = 0 ;
             let count = 0 ;
            function bill(product_name , product_price ) {

                  count++ ;
                  total += product_price ;
 
                document.getElementById("name").innerHTML += product_name +":"+ product_price + "<br>"  ;
                document.getElementById("total").innerHTML =  "Total Price :" + total  ;
                if(total > 3000 && count >= 3){
                      let dis = total * 0.15 ;
                    document.getElementById("dis").innerHTML = "After Discount(15%) Total Bill :" +   (total-dis) ;
                }
                else if (total > 3000){
                    let dis = total * 0.1 ;
                    document.getElementById("dis").innerHTML = "After Discount(10%) Total Bill :" +   (total-dis) ;

                }

  

            }



        </script>
         

    </div>
    
</body>
</html>
