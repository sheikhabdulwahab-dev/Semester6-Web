<!DOCTYPE html>
<html lang="en">
<head>
     <title>Document</title>

     <style>
        .box
        {
            display: flex;
            background-color: yellow;
            border: 1px solid black;
            justify-content: center;
            align-items: center;
  
        }

        #container
        {
            display: grid;
            grid-template-columns: repeat(12 , 1fr);
            grid-template-rows: repeat(24 , 1fr);
            height: 100vh;
             
        }

        
     </style>

</head>
<body>

    <div id="container">
         

        <div class="box" style="grid-row: 1/3; grid-column: 1/3;"> Logo</div>
        <div class="box" style="grid-row: 1/3; grid-column: 3/11;"> Nav Bar</div>
        <div class="box" style="grid-row: 1/3; grid-column: 11/13;"> Login</div>


 
        <div class="box" style="grid-row: 3/7; grid-column: 1/5;"> Text</div>
        <div class="box" style="grid-row: 3/7; grid-column: 5/13;"> Image </div>

         
 
        <div class="box" style="grid-row: 7/22; grid-column: 1/4;"> Side bar</div>

       <!--- <div class="box" style="grid-row: 7/22; grid-column: 4/13;"> Main Body </div> -->

    <div class="box" style="grid-row: 7/22;grid-column: 4/7; background-color: lightgreen; border: 2px solid black; margin: 1px;"></div>
     <div class="box" style="grid-row: 7/14; grid-column: 7/13; background-color: lightgreen; margin: 1px; border: 2px solid black;"></div>
   
     <div class="box" style="grid-row: 14/22; grid-column: 7/10; background-color: lightgreen; margin: 1px; border: 2px solid black;"></div>

      <div class="box" style="grid-row: 14/22; grid-column: 10/13; background-color: lightgreen; margin: 1px; border: 2px solid blue;"></div>



        <div class="box" style="grid-column: 1/13; grid-row: 22/25" >footer</div>

    </div>

    
</body>
</html>
